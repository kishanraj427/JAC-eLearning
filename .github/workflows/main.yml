on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
      
name: "Build & Release"
jobs:
  build:
    name: Build & Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.1'
          channel: 'stable'
          architecture: x64
      
      # decode google-services.json
      # - name: Load google-services file
      #   env:
      #     DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
      #   run: echo $DATA | base64 -di > ./android/app/google-services.json

      # decode keystore
      # - name: Decode keystore
      #   env:
      #     ENCODED_STRING: ${{ secrets.KEYSTORE_BASE_64 }}
      #     RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
      #     RELEASE_KEYSTORE_ALIAS: ${{ secrets.RELEASE_KEYSTORE_ALIAS }}
      #     RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      #   run: |
      #     echo $ENCODED_STRING > keystore-b64.txt
      #     base64 -d keystore-b64.txt > eregister-keystore.jks

      - name: release android
        run: flutter build apk --release --split-per-abi
      
      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/bundle/release/app-release.aab"
          tag: v2.0.${{ github.run_number }}
          token: ${{ secrets.TOKEN }}
